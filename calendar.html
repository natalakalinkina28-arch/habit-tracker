<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Календарь - Habit Tracker</title>
    <link rel="stylesheet" href="calendar.css">
    <style>.nav-item { text-decoration: none; color: inherit; }</style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><span class="clover">✿</span><span>Habit</span></div>
        <a href="index.html" class="nav-item"><span class="icon"></span><span>Главная</span></a>
        <a href="calendar.html" class="nav-item active"><span class="icon"></span><span>Календарь</span></a>
        <a href="statistics.html" class="nav-item"><span class="icon"></span><span>Статистика</span></a>
        <a href="settings.html" class="nav-item"><span class="icon"></span><span>Настройки</span></a>
        <div class="profile-card">
            <div class="avatar"></div>
            <div><div class="name">Имя</div><div class="email">почта@gmail.com</div></div>
        </div>
    </aside>

    <main class="main">
        <div class="content-wrapper">
            <h1 class="page-title">Календарь</h1>
            <div class="calendar-header">
                <button class="nav-btn prev-month"><span>❮</span></button>
                <h2 class="current-month">Май 2026</h2>
                <button class="nav-btn next-month"><span>❯</span></button>
            </div>
            <div class="calendar-container">
                <div class="calendar">
                    <div class="weekday">Пн</div><div class="weekday">Вт</div><div class="weekday">Ср</div><div class="weekday">Чт</div><div class="weekday">Пт</div><div class="weekday">Сб</div><div class="weekday">Вс</div>
                    <div class="day empty"></div><div class="day empty"></div><div class="day empty"></div><div class="day empty"></div>
                    <div class="day">1</div><div class="day">2</div><div class="day">3</div><div class="day">4</div><div class="day">5</div><div class="day">6</div><div class="day">7</div><div class="day">8</div><div class="day">9</div><div class="day">10</div><div class="day">11</div><div class="day">12</div><div class="day">13</div><div class="day">14</div><div class="day">15</div><div class="day">16</div><div class="day">17</div><div class="day">18</div><div class="day">19</div><div class="day">20</div><div class="day">21</div><div class="day">22</div><div class="day">23</div><div class="day">24</div><div class="day">25</div><div class="day">26</div><div class="day">27</div><div class="day">28</div><div class="day">29</div><div class="day">30</div><div class="day">31</div>
                </div>
                <div class="calendar-legend">
                    <div class="legend-item"><div class="legend-color all-completed"></div><span>Все выполнены</span></div>
                    <div class="legend-item"><div class="legend-color partial"></div><span>Частично выполнены</span></div>
                    <div class="legend-item"><div class="legend-color no-data"></div><span>Нет данных</span></div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>

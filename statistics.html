<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Статистика - Habit Tracker</title>
    <link rel="stylesheet" href=" statistics.css">
    <style>.nav-item { text-decoration: none; color: inherit; }</style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><span class="clover">✿</span><span>Habit</span></div>
        <a href="index.html" class="nav-item"><span class="icon"></span><span>Главная</span></a>
        <a href="calendar.html" class="nav-item"><span class="icon"></span><span>Календарь</span></a>
        <a href="statistics.html" class="nav-item active"><span class="icon"></span><span>Статистика</span></a>
        <a href="settings.html" class="nav-item"><span class="icon"></span><span>Настройки</span></a>
        <div class="profile-card">
            <div class="avatar"></div>
            <div><div class="name">Имя</div><div class="email">почта@gmail.com</div></div>
        </div>
    </aside>

    <main class="main">
        <div class="content-wrapper">
            <h1 class="page-title">Статистика</h1>
            <div class="stats-cards-row">
                <div class="stat-card"><div class="stat-label">Текущая серия</div><div class="stat-value">0</div><div class="stat-unit">дней подряд</div></div>
                <div class="stat-card"><div class="stat-label">Лучшее достижение</div><div class="stat-value">0</div><div class="stat-unit">день</div></div>
                <div class="stat-card"><div class="stat-label">Выполнено всего</div><div class="stat-value">0</div><div class="stat-unit">привычек</div></div>
            </div>
            <div class="chart-section">
                <div class="chart-header"><h2 class="chart-title">Прогресс за последние 7 дней</h2><p class="chart-subtitle">Количество выполненных привычек</p></div>
                <div class="bar-chart">
                    <div class="chart-area">
                        <div class="y-axis"><span>5</span><span>4</span><span>3</span><span>2</span><span>1</span><span>0</span></div>
                        <div class="chart-content">
                            <div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div><div class="grid-line"></div><div class="grid-line grid-line-bottom"></div>
                            <div class="bars">
                                <div class="bar-item"><div class="bar" style="height: 0%"></div><span class="day-label">Пн</span><span class="bar-value">0</span></div>
                                <div class="bar-item"><div class="bar" style="height: 0%"></div><span class="day-label">Вт</span><span class="bar-value">0</span></div>
                                <div class="bar-item"><div class="bar" style="height: 0%"></div><span class="day-label">Ср</span><span class="bar-value">0</span></div>
                                <div class="bar-item"><div class="bar" style="height: 0%"></div><span class="day-label">Чт</span><span class="bar-value">0</span></div>
                                <div class="bar-item"><div class="bar" style="height: 0%"></div><span class="day-label">Пт</span><span class="bar-value">0</span></div>
                                <div class="bar-item"><div class="bar" style="height: 0%"></div><span class="day-label">Сб</span><span class="bar-value">0</span></div>
                                <div class="bar-item"><div class="bar" style="height: 0%"></div><span class="day-label">Вс</span><span class="bar-value">0</span></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { display: flex; min-height: 100vh; background: #f5f5f5; }

.sidebar { width: 260px; background: #fff; padding: 24px 16px; display: flex; flex-direction: column; gap: 12px; border-right: 1px solid #e0e0e0; }
.sidebar .logo { font-size: 22px; font-weight: 700; color: #6c5ce7; padding: 8px 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.sidebar .logo .clover { font-size: 24px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 14px 18px; border-radius: 16px; font-size: 16px; color: #333; cursor: pointer; transition: background 0.2s; }
.nav-item:hover { background: #f0e8ff; }
.nav-item.active { background: #e8dff5; color: #6c5ce7; font-weight: 600; }
.nav-item .icon { font-size: 20px; width: 28px; text-align: center; }
.sidebar .profile-card { margin-top: auto; background: linear-gradient(135deg, #ffecd2, #fcb69f); border-radius: 20px; padding: 18px 20px; display: flex; align-items: center; gap: 14px; }
.sidebar .profile-card .avatar { width: 46px; height: 46px; border-radius: 50%; background: #e8943a; }
.sidebar .profile-card .name { font-weight: 600; font-size: 15px; color: #333; }
.sidebar .profile-card .email { font-size: 12px; color: #666; }

.main { flex: 1; background: linear-gradient(180deg, #a29bfe 0%, #6c5ce7 100%); padding: 30px 36px; overflow-y: auto; }
.content-wrapper { max-width: 1000px; margin: 0 auto; }
.page-title { font-size: 32px; font-weight: 700; color: #fff; margin-bottom: 24px; }

.stats-cards-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; margin-bottom: 24px; }
.stat-card { background: #fff; border-radius: 20px; padding: 24px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.08); transition: transform 0.2s; }
.stat-card:hover { transform: translateY(-3px); }
.stat-label { font-size: 14px; color: #888; margin-bottom: 8px; }
.stat-value { font-size: 42px; font-weight: 700; color: #6c5ce7; line-height: 1; margin-bottom: 4px; }
.stat-unit { font-size: 13px; color: #999; }

.chart-section { background: #fff; border-radius: 24px; padding: 28px; box-shadow: 0 4px 25px rgba(0,0,0,0.1); }
.chart-header { margin-bottom: 24px; }
.chart-title { font-size: 20px; font-weight: 700; color: #2d2d2d; margin-bottom: 6px; }
.chart-subtitle { font-size: 14px; color: #888; }

.bar-chart { background: #fff; }
.chart-area { display: flex; align-items: flex-end; height: 280px; }
.y-axis { display: flex; flex-direction: column; justify-content: space-between; padding-right: 12px; height: 100%; padding-bottom: 30px; }
.y-axis span { font-size: 13px; color: #999; height: 36px; display: flex; align-items: center; justify-content: flex-end; width: 20px; }
.chart-content { flex: 1; position: relative; height: 100%; padding-bottom: 30px; }
.grid-line { position: absolute; left: 0; right: 0; height: 1px; background: #eee; }
.grid-line:nth-child(1) { top: 0%; } .grid-line:nth-child(2) { top: 20%; } .grid-line:nth-child(3) { top: 40%; } .grid-line:nth-child(4) { top: 60%; } .grid-line:nth-child(5) { top: 80%; } .grid-line:nth-child(6) { top: 100%; }
.grid-line-bottom { background: #ddd; height: 2px; }
.bars { display: flex; justify-content: space-between; align-items: flex-end; height: 100%; padding-top: 10px; position: relative; z-index: 1; }
.bar-item { display: flex; flex-direction: column; align-items: center; flex: 1; height: 100%; justify-content: flex-end; }
.bar { width: 40px; background: linear-gradient(180deg, #a29bfe 0%, #6c5ce7 100%); border-radius: 8px 8px 0 0; min-height: 4px; transition: height 0.5s ease; }
.day-label { margin-top: 10px; font-size: 13px; color: #888; font-weight: 500; }
.bar-value { font-size: 14px; font-weight: 600; color: #6c5ce7; margin-bottom: 8px; }

@media (max-width: 768px) {
    .sidebar { width: 200px; padding: 16px 12px; }
    .stats-cards-row { grid-template-columns: 1fr; }
    .chart-section { padding: 20px; }
    .bar { width: 24px; }
    .y-axis span { font-size: 11px; }
}
    </style>
</body>
</html>
